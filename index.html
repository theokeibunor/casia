    <script>
        $(function() {
            AOS.init();

            $('.carousel').carousel();
        })
    </script>
    <script>
        $(function() {
            let faqOpen = false;
            $('.faq-question').click(function() {
                let expandIcon = '<img src="images/plus-icon.svg" alt="expand">';
                let collapseIcon = '<img src="images/minus-icon.svg" alt="collapse">';
                if(!$(this).parent().hasClass('faq-open')) {
                    $(this).parent().addClass('faq-open');
                    $(this).find('.faq-icon').html(collapseIcon);
                } else {
                    $(this).parent().removeClass('faq-open');
                    $(this).find('.faq-icon').html(expandIcon);
                }
                $(this).closest('.faq').find('.faq-answer').slideToggle('fast');
            });

            function toggleFeature() {
                $('.feature-title').click(function() {
                    $(this).closest('.feature').find('.feature-content').slideToggle();
                });
            }
            toggleFeature();

            let open = false;
            $('.plan-details .more-details').click(function() {
                $(this).closest('.plan-details').find('.plan-more-details').slideToggle();
                open = !open;
                let btnText = open ? '<i class="fas fa-arrow-up"></i> &nbsp; Less Details': '<i class="fas fa-arrow-down"></i> &nbsp; More Details';
                $(this).html(btnText);
            });

            $('.btn-switch-plan').click(function() {
                let cycle = $(this).data('cycle');
                if(cycle == 'yearly') {
                    $(this).closest('.plan').find('.monthly-price').hide();
                    $(this).closest('.plan').find('.yearly-price').show();
                } else {
                    $(this).closest('.plan').find('.monthly-price').show();
                    $(this).closest('.plan').find('.yearly-price').hide();
                }
                $(this).closest('.plan').find('.btn-switch-plan').removeClass('active');
                $(this).addClass('active');
            });
        });
    </script>
</body>
